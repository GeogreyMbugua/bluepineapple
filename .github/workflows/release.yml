name: Release

on:
  push:
    branches: ["main"]

jobs:
  release:
    name: Release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run CI (lint, typecheck, tests)
        run: |
          pnpm lint
          pnpm --filter @blue-pineapple/database run generate
          pnpm --filter @blue-pineapple/iam run typecheck
          pnpm --filter @blue-pineapple/web run typecheck
          pnpm --filter @blue-pineapple/iam run test -- --run --silent

      - name: Build web app
        run: pnpm --filter @blue-pineapple/web build

      - name: Package dist
        run: |
          mkdir -p artifacts
          tar -czf artifacts/workspace-dist.tgz packages/*/dist || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-dist
          path: artifacts/workspace-dist.tgz
